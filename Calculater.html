<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Calculater.css">
</head>
<body>
    <div class="a">
        <div id="display"></div>
        <div><button class="b" data-value="1">1</button></div>
        <div><button class="b" data-value="2">2</button></div>
        <div><button class="b" data-value="3">3</button></div>
        <div><button class="b" data-value="+">+</button></div>
        <div><button class="b" data-value="4">4</button></div>
        <div><button class="b" data-value="5">5</button></div>
        <div><button class="b" data-value="6">6</button></div>
        <div><button class="b" data-value="-">-</button></div>
        <div><button class="b" data-value="7">7</button></div>
        <div><button class="b" data-value="8">8</button></div>
        <div><button class="b" data-value="9">9</button></div>
        <div><button class="b" data-value="*">*</button></div>
        <div><button class="b" id="equal" data-value="=">=</button></div>
        <div><button class="b" data-value="Clr" id="clear">Clr</button></div>
        <div><button class="b" data-value="0">0</button></div>
        <div><button class="b" data-value="/">/</button></div>
    </div>

    <script src="Calculater.js"></script>

</body>
</html>
